<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="grad-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <linearGradient id="grad-frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="50%" stop-color="#0f0b2e" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="grad-mirror" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(49, 46, 129, 0.7)" />
      <stop offset="50%" stop-color="rgba(67, 56, 202, 0.4)" />
      <stop offset="100%" stop-color="rgba(49, 46, 129, 0.15)" />
    </linearGradient>
    <linearGradient id="grad-shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2" />
      <stop offset="30%" stop-color="#818cf8" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="70%" stop-color="#fbbf24" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="grad-reflect" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.5" />
      <stop offset="40%" stop-color="#6366f1" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.06" />
    </linearGradient>
  </defs>

  <polygon points="50,2 84,18 98,50 84,82 50,98 16,82 2,50 16,18"
    fill="url(#grad-frame)" />
  <polygon points="50,2 84,18 98,50 84,82 50,98 16,82 2,50 16,18"
    fill="none" stroke="url(#grad-indigo)" stroke-width="1.5" />
  <polygon points="50,10 76,22 88,50 76,78 50,90 24,78 12,50 24,22"
    fill="url(#grad-mirror)" />
  <polygon points="50,10 76,22 88,50 76,78 50,90 24,78 12,50 24,22"
    fill="none" stroke="url(#grad-indigo)" stroke-width="2" />

  <!-- The W -->
  <path d="M24,28 L34,50 L50,32 L66,50 L76,28" fill="none"
    stroke="url(#grad-indigo)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Mirror line -->
  <line x1="16" y1="50" x2="84" y2="50"
    stroke="url(#grad-shimmer)" stroke-width="2.5" />

  <!-- Reflected W -->
  <path d="M24,72 L34,50 L50,68 L66,50 L76,72" fill="none"
    stroke="url(#grad-reflect)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Corner accents -->
  <line x1="50" y1="2" x2="50" y2="10" stroke="url(#grad-amber)" stroke-width="2" />
  <line x1="50" y1="90" x2="50" y2="98" stroke="url(#grad-amber)" stroke-width="2" />
  <line x1="2" y1="50" x2="12" y2="50" stroke="url(#grad-amber)" stroke-width="2" />
  <line x1="88" y1="50" x2="98" y2="50" stroke="url(#grad-amber)" stroke-width="2" />
</svg>
